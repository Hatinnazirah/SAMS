name: sams_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.0.4
  firebase_core: ^3.8.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.0.0
  file_picker: ^8.3.4
  intl: ^0.19.0
  flutter_pdfview: ^1.3.1
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/ModuleBookingIcon.png
    - assets/icons/MySubjectsIcon.png
    - assets/icons/ActivitiesIcon.png
    - assets/icons/CreditClaimIcon.png
    - assets/icons/sams_logo.png
    - assets/icons/PusatAdabIcon1.png
    - assets/icons/PusatAdabIcon2.png